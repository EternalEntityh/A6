<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR · Zakky para Anny</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      /* Tamaño máximo 320px, mínimo el ancho del móvil con padding */
      width: min(320px, calc(100vw - 3rem));
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <!--
    INSTRUCCIONES:
    1. Pon tu imagen del QR en la misma carpeta con el nombre  mi-qr.png
    2. Abre este archivo en el navegador — verás solo el QR centrado en blanco
  -->
  <img src="mi-qr.png" alt="QR de Zakky para Anny" />
</body>
</html>
